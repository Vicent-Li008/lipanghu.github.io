<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李胖虎的网站</title>
    <!-- 关联CSS文件（让网站变好看，新手无需修改这行代码） -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 网站头部：标题和导航栏（新手可修改标题文字） -->
    <header>
        <h1>欢迎来到我的小网站</h1>
        <nav>
            <a href="#home">首页</a>
            <a href="#about">关于我</a>
            <a href="#works">我的作品</a>
        </nav>
    </header>

    <!-- 网站主体：核心内容（新手重点修改这里的文字和图片） -->
    <main>
        <section id="home">
            <h2>首页</h2>
            <p>姜同志好！这是胖虎的第一个小网站</p>
            <p>跟着步骤操作，你也能轻松做出属于自己的小网站！</p>
            <!-- 插入一张图片（默认是随机风景图，可替换成自己的图片） -->
            <img src="file:///Users/jiangruoyun/Desktop/%E7%85%A7%E7%89%87/E71A4809%E4%B8%8D%E5%BF%98%E4%BA%B2%E6%81%A9%E4%B9%9D%E5%AE%AB%E6%A0%BC%E6%91%86%E5%8F%B0.jpg" alt="姜同志">
        </section>

        <section id="about">
            <h2>关于我</h2>
            <p>我是一名Mac新手，正在学习开发小网站，这是我的第一个作品。</p>
            <p>我平时喜欢拍照、看书，希望通过这个小网站，记录自己的学习和生活。</p>
        </section>

        <section id="works">
            <h2>我的作品</h2>
            <ul>
                <li>作品1：我的第一个小网站（就是当前这个网站哦）</li>
                <li>作品2：待更新...（后续学会更多知识再补充）</li>
                <li>作品3：待更新...（一起加油，解锁更多技能）</li>
            </ul>
        </section>
    </main>

    <!-- 网站底部：版权信息（新手可修改年份和文字） -->
    <footer>
        <p>© 2026 我的小网站 | 新手开发，多多包涵</p>
    </footer>

    <!-- 关联JS文件（可选，新手可先不做，后续进阶再添加） -->
    <script src="script.js"></script>
</body>
</html>
